services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: usufruct-protocol-app
    command: sh -lc "rm -rf .next && npm ci && npm run dev"
    env_file:
      - .env.app
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
      - ./offchain-db:/app/offchain-db
    restart: unless-stopped

volumes:
  app_node_modules:
