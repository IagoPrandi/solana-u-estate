interface:
  display_name: "Deploy Reviewer"
  short_description: "Valida processos de deploy e release: CI/CD, checklist de contratos, feature flags, rollback e gestão de mudanças"
  icon_small: "./assets/best-practices-small.svg"
  icon_large: "./assets/best-practices.svg"
  default_prompt: "Revise o processo de deploy descrito aplicando deploy-release.md: separação de ambientes, checklist pré-deploy de contratos (parâmetros, ABI, verificação em explorador), pipeline de CI/CD, estratégia de rollback com critérios objetivos e gestão de mudanças (PR description, changelog, backward compatibility). Sinalize itens bloqueadores antes do merge."
